# =============================================================================
# MARINE Stage A — 수중 지도복원 학습 설정 (experiments/train_marine.py)
# =============================================================================
# 모델은 LUNA2 BilateralLowLightNet 그대로(warm-start 호환). 데이터/증강/평가만
# 수중용으로 교체. 경로는 configs/paths_marine.yaml 주입.
# =============================================================================

experiment_name: "marineA_warmstart"
seed: 42

# --- 데이터 ---
data:
  image_size: 256        # 학습 random crop / eval resize
  eval_size: 256
  num_workers: 4
  # train = EUVP(underwater_imagenet+dark) + UIEB train split
  # eval  = UIEB test split (paired, resize-only, augment off)

# --- 모델 (LUNA2 bilateral_base 와 동일 — warm-start 호환 필수) ---
model:
  cw: 32
  grid_size: 16
  depth: 8
  low_res: 256
  refine_channels: 24
  refine_blocks: 2
  guidance_channels: 16
  norm: "in"

# --- 최적화 (warm-start 이므로 lr 을 LUNA2(2e-4) 대비 낮춤) ---
training:
  batch_size: 16
  num_epochs: 30
  optimizer: "adam"
  lr: 1.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.0
  scheduler: "cosine"
  eta_min_ratio: 0.01
  amp: true
  grad_clip: 1.0
  warmstart: true        # paths_marine.yaml::warmstart.luna2_p1 로드 (--no_warmstart 로 off)

# --- 손실 (LUNA2 복원손실 그대로; gray-world 색항상성은 M2에서 추가 예정) ---
loss:
  lambda_l1: 1.0
  lambda_vgg: 0.5
  lambda_ssim: 1.0
  use_perceptual: true
  perceptual_layers: ["relu3_3"]
  lambda_grayworld: 0.0    # 수중 색항상성(>0 시 활성; M2.5는 --grayworld 0.1 로 켬)

# --- 로깅 (runs/{experiment_name}/) ---
logging:
  save_every: 5
  eval_every: 1
  sample_every: 5
  num_samples: 4
  tensorboard: false
